# Production Profile
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:3306/${DB_NAME:digital_marketplace}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.thymeleaf.cache=true
spring.web.resources.static-locations=classpath:/static/

server.port=8386

app.upload-dir=/app/uploads

vnpay.tmn-code=${VNPAY_TMN_CODE:DEMO0001}
vnpay.hash-secret=${VNPAY_HASH_SECRET:DEMOHASHDEMOHASHDEMOHASHDEMO1234}
vnpay.payment-url=${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8386/payment/callback}