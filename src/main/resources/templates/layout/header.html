<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header">
    <nav class="navbar">
        <div class="nav-inner">
            <a th:href="@{/}" class="brand">
                <div class="brand-mark"><i class="fa-solid fa-bolt"></i></div>
                <div>
                    <div class="brand-name">PixelVault<span class="text-accent">.</span></div>
                    <span class="brand-sub">Digital Goods · VN</span>
                </div>
            </a>
            <ul class="nav-links">
                <li><a th:href="@{/}">Trang chủ</a></li>
                <li><a th:href="@{/marketplace}">Cửa hàng</a></li>
                <li><a th:href="@{/marketplace(section='deals')}">Flash Sale</a></li>
                <li><a href="#">Hỗ trợ</a></li>
            </ul>
            <div class="nav-right">
                <a th:href="@{/cart}" class="icon-btn" title="Giỏ hàng" style="position:relative;">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="badge"
                          th:text="${cartItemCount != null ? cartItemCount : 0}">0</span>
                </a>
                <div sec:authorize="!isAuthenticated()" class="d-flex gap-2 align-items-center">
                    <a th:href="@{/auth/login}" class="btn btn-ghost" style="padding:8px 16px;font-size:14px;">Đăng nhập</a>
                    <a th:href="@{/auth/register}" class="btn btn-primary" style="padding:8px 16px;font-size:14px;">Đăng ký</a>
                </div>
                <div sec:authorize="isAuthenticated()" class="position-relative user-dropdown-wrap">
                    <button class="avatar-btn" onclick="this.parentElement.querySelector('.user-dropdown').classList.toggle('open')">
                        <i class="fa-solid fa-user" style="font-size:16px;"></i>
                        <span sec:authentication="name">User</span>
                        <i class="fa-solid fa-chevron-down" style="font-size:11px;margin-left:4px;"></i>
                    </button>
                    <div class="user-dropdown">
                        <style>.user-dropdown.open{display:block!important}</style>
                        <a th:href="@{/order/history}" class="d-flex align-items-center gap-2 px-3 py-2 text-reset text-decoration-none rounded" style="font-size:14px;">
                            <i class="fa-solid fa-box"></i> Đơn hàng của tôi
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="d-flex align-items-center gap-2 px-3 py-2 text-accent text-decoration-none rounded" style="font-size:14px;">
                            <i class="fa-solid fa-shield-halved"></i> Admin Panel
                        </a>
                        <hr class="my-1" style="border-color:var(--line);">
                        <form th:action="@{/auth/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="d-flex align-items-center gap-2 w-100 px-3 py-2 text-danger-custom bg-transparent border-0 rounded" style="font-size:14px;cursor:pointer;text-align:left;">
                                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>
</body>
</html>
