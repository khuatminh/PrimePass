<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Marketplace</title>
    <div th:replace="~{layout/css :: css}"></div>
</head>
<body class="bg-light">
<div th:replace="~{layout/header :: header}"></div>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4 fw-bold">Create Account</h4>
                    <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>
                    <form th:action="@{/auth/register}" th:object="${userDto}" method="post" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   id="username" th:field="*{username}" placeholder="Choose a username">
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   id="email" th:field="*{email}" placeholder="Enter email address">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="fullName" class="form-label">Full Name</label>
                            <input type="text" class="form-control"
                                   id="fullName" th:field="*{fullName}" placeholder="Your full name (optional)">
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control"
                                   id="phone" th:field="*{phone}" placeholder="Phone number (optional)">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   id="password" th:field="*{password}" placeholder="At least 6 characters">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                   id="confirmPassword" th:field="*{confirmPassword}" placeholder="Re-enter password">
                            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-person-plus me-1"></i>Register
                            </button>
                        </div>
                    </form>
                    <hr class="my-3">
                    <p class="text-center mb-0 small">
                        Already have an account?
                        <a th:href="@{/auth/login}" class="text-decoration-none">Sign in here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
<div th:replace="~{layout/js :: js}"></div>
</body>
</html>
