<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn hàng của tôi — PixelVault</title>
    <th:block th:replace="~{layout/css :: css}" />
    <link rel="stylesheet" th:href="@{/css/order.css}" />
</head>
<body>
<th:block th:replace="~{layout/header :: header}" />

<div class="orders-page">
  <div class="container">
    <h1>Đơn hàng của tôi</h1>

    <div class="empty-state" th:if="${orders.isEmpty()}">
      <i class="fa-solid fa-box-open"></i>
      <p class="mb-3" style="font-size:15px;">Bạn chưa có đơn hàng nào.</p>
      <a th:href="@{/marketplace}" class="btn btn-primary">Khám phá cửa hàng</a>
    </div>

    <div class="orders-wrap" th:unless="${orders.isEmpty()}">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Mã đơn</th>
            <th>Ngày đặt</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="order : ${orders}">
            <td><span class="order-id" th:text="'#' + ${order.id}">-</span></td>
            <td th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}">-</td>
            <td class="font-mono fw-semibold"
                th:text="'₫' + ${#numbers.formatDecimal(order.finalAmount,0,'COMMA',0,'POINT')}">₫0</td>
            <td>
              <th:block th:switch="${order.status.name()}">
                <span th:case="'pending'" class="pill pill-warning">Chờ xử lý</span>
                <span th:case="'processing'" class="pill pill-accent">Đang xử lý</span>
                <span th:case="'completed'" class="pill pill-success">Hoàn thành</span>
                <span th:case="'cancelled'" class="pill pill-danger">Đã hủy</span>
                <span th:case="*" class="pill" th:text="${order.status}">-</span>
              </th:block>
            </td>
            <td>
              <a th:href="@{/order/{id}(id=${order.id})}" class="btn btn-ghost" style="font-size:13px;">
                Xem chi tiết <i class="fa-solid fa-arrow-right" style="font-size:11px;"></i>
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<th:block th:replace="~{layout/footer :: footer}" />
<th:block th:replace="~{layout/js :: js}" />
</body>
</html>
