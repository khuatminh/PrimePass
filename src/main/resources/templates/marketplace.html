<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cửa hàng — PixelVault</title>
    <th:block th:replace="~{layout/css :: css}" />
</head>
<body>
<th:block th:replace="~{layout/header :: header}" />

<div class="mp-hero">
  <div class="container">
    <div class="mp-hero-top">
      <div>
        <div class="eyebrow">Cửa hàng số</div>
        <h1>Tất cả sản phẩm.</h1>
        <p>Tài khoản premium, key game, công cụ AI &amp; hơn nữa. Giao tự động, bảo hành trọn gói.</p>
      </div>
      <form th:action="@{/marketplace}" method="get" class="mp-search">
        <i class="fa-solid fa-magnifying-glass text-dim"></i>
        <input type="text" name="keyword" placeholder="Tìm sản phẩm..." th:value="${keyword}" />
        <input type="hidden" name="categoryId" th:if="${selectedCategoryId != null}" th:value="${selectedCategoryId}" />
        <button type="submit">Tìm</button>
      </form>
    </div>
  </div>
</div>

<div class="container">
  <div class="mp-body">
    <!-- Sidebar filters -->
    <aside class="filter-panel">
      <h4>Danh mục</h4>
      <a th:href="@{/marketplace(keyword=${keyword})}"
         class="cat-filter-item"
         th:classappend="${selectedCategoryId == null} ? ' active' : ''">
        <i class="fa-solid fa-border-all text-center" style="width:16px"></i>
        Tất cả
        <span class="count" th:text="${totalElements ?: ''}"></span>
      </a>
      <a th:each="cat : ${categories}"
         th:href="@{/marketplace(categoryId=${cat.id}, keyword=${keyword})}"
         class="cat-filter-item"
         th:classappend="${cat.id == selectedCategoryId} ? ' active' : ''">
        <i class="fa-solid fa-tag text-center" style="width:16px"></i>
        <span th:text="${cat.name}">Category</span>
      </a>

      <th:block th:if="${keyword != null or selectedCategoryId != null}">
        <div class="mt-4">
          <a th:href="@{/marketplace}" class="btn btn-outline w-100 justify-content-center" style="font-size:13px;">
            <i class="fa-solid fa-xmark"></i> Xóa bộ lọc
          </a>
        </div>
      </th:block>
    </aside>

    <!-- Main content -->
    <div>
      <div class="toolbar">
        <div class="toolbar-info">
          <strong th:text="${totalElements ?: 0}">0</strong> sản phẩm
          <span th:if="${keyword != null and keyword != ''}" th:text="' · Kết quả cho &quot;' + ${keyword} + '&quot;'"></span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <select class="sort-select" onchange="location.href=this.value">
            <option th:value="@{/marketplace(keyword=${keyword},categoryId=${selectedCategoryId},sort='newest')}"
                    th:selected="${sort == 'newest' or sort == null}">Mới nhất</option>
            <option th:value="@{/marketplace(keyword=${keyword},categoryId=${selectedCategoryId},sort='price_asc')}"
                    th:selected="${sort == 'price_asc'}">Giá: thấp → cao</option>
            <option th:value="@{/marketplace(keyword=${keyword},categoryId=${selectedCategoryId},sort='price_desc')}"
                    th:selected="${sort == 'price_desc'}">Giá: cao → thấp</option>
          </select>
        </div>
      </div>

      <!-- Product grid -->
      <div class="prod-grid">
        <th:block th:if="${products != null and !products.empty}">
          <article th:each="product : ${products}" class="product-card">
            <a th:href="@{/product/{slug}(slug=${product.slug})}" class="text-reset text-decoration-none" style="display:contents;">
              <div class="product-thumb"
                   style="display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:40px;color:rgba(255,255,255,0.4);">
                <span th:text="${#strings.toUpperCase(#strings.substring(product.name, 0, T(java.lang.Math).min(2, product.name.length())))}">PV</span>
                <div class="product-badges">
                  <span class="badge-hot" th:if="${product.isFeatured}"><i class="fa-solid fa-fire"></i> HOT</span>
                  <span class="badge-disc"
                        th:if="${product.originalPrice != null and product.originalPrice > product.salePrice}"
                        th:text="'-' + ${#numbers.formatDecimal((1 - product.salePrice / product.originalPrice) * 100, 0, 0)} + '%'">-30%</span>
                </div>
              </div>
              <div class="product-body">
                <div class="product-meta">
                  <span class="product-cat" th:text="${product.category != null ? product.category.name : 'Digital'}">Category</span>
                </div>
                <h3 class="product-title" th:text="${product.name}">Product Name</h3>
                <p class="product-desc" th:text="${product.description != null ? #strings.abbreviate(product.description, 80) : ''}"></p>
                <div class="product-price-row">
                  <div class="price-stack">
                    <span class="price-old"
                          th:if="${product.originalPrice != null and product.originalPrice > product.salePrice}"
                          th:text="'₫' + ${#numbers.formatDecimal(product.originalPrice, 0, 'COMMA', 0, 'POINT')}"></span>
                    <span class="price-new" th:text="'₫' + ${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')}">₫0</span>
                  </div>
                  <button class="buy-btn" title="Xem chi tiết"><i class="fa-solid fa-arrow-right"></i></button>
                </div>
              </div>
            </a>
          </article>
        </th:block>

        <div class="empty-state" th:if="${products == null or products.empty}">
          <i class="fa-solid fa-box-open"></i>
          <p class="mb-2" style="font-size:16px">Không tìm thấy sản phẩm nào.</p>
          <a th:href="@{/marketplace}" class="btn btn-ghost">Xem tất cả sản phẩm</a>
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination-row" th:if="${totalPages != null and totalPages > 1}">
        <a class="page-btn"
           th:href="@{/marketplace(keyword=${keyword},categoryId=${selectedCategoryId},page=${currentPage - 1})}"
           th:classappend="${currentPage == 0} ? ' disabled' : ''">
          <i class="fa-solid fa-chevron-left"></i>
        </a>
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
          <a class="page-btn"
             th:href="@{/marketplace(keyword=${keyword},categoryId=${selectedCategoryId},page=${i})}"
             th:classappend="${i == currentPage} ? ' active' : ''"
             th:text="${i + 1}">1</a>
        </th:block>
        <a class="page-btn"
           th:href="@{/marketplace(keyword=${keyword},categoryId=${selectedCategoryId},page=${currentPage + 1})}"
           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled' : ''">
          <i class="fa-solid fa-chevron-right"></i>
        </a>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{layout/footer :: footer}" />
<th:block th:replace="~{layout/js :: js}" />
</body>
</html>
