<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sản phẩm — Admin PrimePass</title>
    <th:block th:replace="~{admin/layout/css :: css}" />
</head>
<body>
<div class="admin-shell">
    <th:block th:replace="~{admin/layout/sidebar :: sidebar(currentPage='products')}" />
    <main class="admin-main">
        <div class="page-header">
            <h1>Quản lý sản phẩm</h1>
        </div>

        <div th:if="${successMessage}" class="mb-4" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--success);padding:12px 16px;border-radius:var(--r-sm);font-size:14px;">
            <i class="fa-solid fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>

        <div class="action-bar">
            <form th:action="@{/admin/products}" method="get" class="d-flex gap-2" style="flex:1;max-width:400px;">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm sản phẩm..."
                       style="flex:1;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-size:14px;outline:none;" />
                <button class="btn btn-ghost" type="submit" style="padding:9px 16px;"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
            <a th:href="@{/admin/products/add}" class="btn btn-primary ms-auto">
                <i class="fa-solid fa-plus"></i> Thêm sản phẩm
            </a>
        </div>

        <div class="table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Tên sản phẩm</th>
                        <th>Giá bán</th>
                        <th>Danh mục</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products.content}">
                        <td class="font-mono text-muted-custom" style="font-size:12px;" th:text="${p.id}"></td>
                        <td class="fw-semibold" th:text="${p.name}"></td>
                        <td class="font-mono" th:text="'₫' + ${#numbers.formatDecimal(p.salePrice,0,'COMMA',0,'POINT')}">₫0</td>
                        <td class="text-muted-custom" th:text="${p.category != null ? p.category.name : '-'}"></td>
                        <td>
                            <span th:if="${p.isActive}" class="pill pill-success" style="font-size:11px;">Hiển thị</span>
                            <span th:unless="${p.isActive}" class="pill" style="font-size:11px;">Ẩn</span>
                        </td>
                        <td class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-ghost px-2 py-1" style="font-size:12px;">Sửa</a>
                            <a th:href="@{/admin/products/{id}/variants(id=${p.id})}" class="btn btn-ghost px-2 py-1 text-warning-custom" style="font-size:12px;">Variants</a>
                            <a th:href="@{/admin/products/delete/{id}(id=${p.id})}" class="btn btn-ghost px-2 py-1 text-danger-custom" style="font-size:12px;" onclick="return confirm('Xóa sản phẩm này?')">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${products == null or products.empty}">
                        <td colspan="6" class="text-center text-muted-custom p-4">Không tìm thấy sản phẩm nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-center gap-1 mt-4" th:if="${products.totalPages > 1}">
            <th:block th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}">
                <a style="width:36px;height:36px;border-radius:8px;display:grid;place-items:center;font-size:13px;text-decoration:none;border:1px solid var(--line);transition:all .15s;"
                   th:href="@{/admin/products(page=${i},keyword=${keyword})}"
                   th:text="${i + 1}"
                   th:style="${i == products.number} ? 'background:var(--accent);border-color:var(--accent);color:#fff;' : 'background:rgba(255,255,255,.04);color:var(--text-muted);'">1</a>
            </th:block>
        </div>
    </main>
</div>
<th:block th:replace="~{admin/layout/js :: js}" />
</body>
</html>
