<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sửa sản phẩm — Admin PrimePass</title>
    <th:block th:replace="~{admin/layout/css :: css}" />
</head>
<body>
<div class="admin-shell">
    <th:block th:replace="~{admin/layout/sidebar :: sidebar(currentPage='products')}" />
    <main class="admin-main">
        <div class="page-header">
            <h1>Sửa sản phẩm</h1>
            <p th:text="'ID: ' + ${product.id}"></p>
        </div>
        <div class="form-card" style="max-width:680px;">
            <form th:action="@{/admin/products/edit/{id}(id=${product.id})}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-field">
                    <label>Tên sản phẩm *</label>
                    <input type="text" name="name" th:value="${product.name}" required />
                </div>
                <div class="form-field">
                    <label>Mô tả ngắn</label>
                    <input type="text" name="shortDescription" value="" />
                </div>
                <div class="form-field">
                    <label>Mô tả chi tiết</label>
                    <textarea name="description" rows="5" th:text="${product.description}"></textarea>
                </div>
                <div class="d-grid" style="grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-field">
                        <label>Danh mục *</label>
                        <select name="categoryId" required>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                    th:selected="${product.category != null and cat.id == product.category.id}"></option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>Loại giao hàng</label>
                        <select name="deliveryType">
                            <option th:each="dt : ${deliveryTypes}" th:value="${dt}" th:text="${dt}"
                                    th:selected="${dt == product.deliveryType}"></option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>Giá gốc (₫)</label>
                        <input type="number" name="originalPrice" th:value="${product.originalPrice}" min="0" />
                    </div>
                    <div class="form-field">
                        <label>Giá bán (₫) *</label>
                        <input type="number" name="salePrice" th:value="${product.salePrice}" min="0" required />
                    </div>
                </div>
                <div class="form-field">
                    <label>Bảo hành</label>
                    <input type="text" name="warrantyInfo" th:value="${product.warrantyInfo}" />
                </div>
                <div class="form-field">
                    <label>Ảnh mới (để trống nếu giữ nguyên)</label>
                    <div th:if="${product.imageUrl != null}" class="mb-2">
                        <img th:src="${product.imageUrl}" th:alt="${product.name}" style="max-height:120px;border-radius:var(--r-sm);border:1px solid var(--line);">
                    </div>
                    <input type="file" name="imageFile" accept="image/*" />
                </div>
                <div class="d-flex gap-3 mb-4">
                    <label class="d-flex align-items-center gap-2 text-muted-custom" style="cursor:pointer;font-size:14px;">
                        <input type="checkbox" name="isFeatured" th:checked="${product.isFeatured}" style="accent-color:var(--accent);width:16px;height:16px;" />
                        Sản phẩm nổi bật
                    </label>
                    <label class="d-flex align-items-center gap-2 text-muted-custom" style="cursor:pointer;font-size:14px;">
                        <input type="checkbox" name="isActive" th:checked="${product.isActive}" style="accent-color:var(--accent);width:16px;height:16px;" />
                        Hiển thị trên cửa hàng
                    </label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Cập nhật</button>
                    <a th:href="@{/admin/products}" class="btn btn-ghost">Hủy</a>
                </div>
            </form>
        </div>
    </main>
</div>
<th:block th:replace="~{admin/layout/js :: js}" />
</body>
</html>
