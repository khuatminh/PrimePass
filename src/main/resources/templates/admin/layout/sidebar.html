<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<aside th:fragment="sidebar(currentPage)" class="sidebar">
    <a th:href="@{/}" class="sidebar-brand">
        <div class="brand-mark"><i class="fa-solid fa-bolt"></i></div>
        <div>
            <div class="brand-name">PrimePass<span class="text-accent">.</span></div>
            <div class="brand-sub">Admin Panel</div>
        </div>
    </a>

    <div class="sidebar-label">Tổng quan</div>
    <nav class="sidebar-nav">
        <a th:href="@{/admin}" class="side-item"
           th:classappend="${currentPage == 'dashboard'} ? ' active' : ''">
            <i class="fa-solid fa-gauge-high"></i> Dashboard
        </a>
    </nav>

    <div class="sidebar-label">Quản lý</div>
    <nav class="sidebar-nav">
        <a th:href="@{/admin/categories}" class="side-item"
           th:classappend="${currentPage == 'categories'} ? ' active' : ''">
            <i class="fa-solid fa-tags"></i> Danh Mục
        </a>
        <a th:href="@{/admin/products}" class="side-item"
           th:classappend="${currentPage == 'products'} ? ' active' : ''">
            <i class="fa-solid fa-box"></i> Sản Phẩm
        </a>
        <a th:href="@{/admin/keys}" class="side-item"
           th:classappend="${currentPage == 'keys'} ? ' active' : ''">
            <i class="fa-solid fa-key"></i> Kho Key
        </a>
        <a th:href="@{/admin/orders}" class="side-item"
           th:classappend="${currentPage == 'orders'} ? ' active' : ''">
            <i class="fa-solid fa-receipt"></i> Đơn Hàng
        </a>
        <a th:href="@{/admin/users}" class="side-item"
           th:classappend="${currentPage == 'users'} ? ' active' : ''">
            <i class="fa-solid fa-users"></i> Người Dùng
        </a>
        <a th:href="@{/admin/coupons}" class="side-item"
           th:classappend="${currentPage == 'coupons'} ? ' active' : ''">
            <i class="fa-solid fa-ticket"></i> Mã Giảm Giá
        </a>
    </nav>

    <div class="sidebar-footer">
        <a th:href="@{/}" class="side-item mb-2">
            <i class="fa-solid fa-arrow-left"></i> Về Trang Chủ
        </a>
        <form th:action="@{/auth/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-outline w-100 text-danger-custom" style="border-color:var(--danger);font-size:13px;">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </button>
        </form>
    </div>
</aside>
</body>
</html>
