<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><title>Coupon | Admin</title><th:block th:replace="~{admin/layout/css :: css}"></th:block></head>
<body class="bg-dark text-white">
<div class="d-flex" style="min-height:100vh">
    <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>
    <div class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{admin/layout/header :: header('Quan Ly Coupon')}"></div>
        <main class="p-4">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div class="d-flex justify-content-between mb-3">
                <h5 class="fw-bold">Danh Sach Coupon</h5>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCouponModal">+ Them</button>
            </div>
            <table class="table table-dark table-striped">
                <thead><tr><th>Code</th><th>Loai</th><th>Gia tri</th><th>Da dung</th><th>Het han</th><th>Trang thai</th><th></th></tr></thead>
                <tbody>
                    <tr th:each="c : ${coupons}">
                        <td><strong th:text="${c.code}"></strong></td>
                        <td th:text="${c.discountType}"></td>
                        <td th:text="${c.discountType.name() == 'percent'} ? ${c.discountValue + '%'} : ${#numbers.formatDecimal(c.discountValue,0,'COMMA',0,'POINT') + 'd'}"></td>
                        <td th:text="${c.usedCount + '/' + c.maxUses}"></td>
                        <td th:text="${c.endDate != null ? c.endDate : 'infinity'}"></td>
                        <td><span class="badge" th:classappend="${c.isActive} ? 'bg-success' : 'bg-secondary'" th:text="${c.isActive} ? 'Active' : 'Tat'"></span></td>
                        <td>
                            <form th:action="@{/admin/coupons/{id}/toggle(id=${c.id})}" method="post">
                                <button class="btn btn-sm btn-outline-warning">Toggle</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>
</div>
<div class="modal fade" id="addCouponModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-secondary text-white">
            <div class="modal-header"><h5 class="modal-title">Them Coupon</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/admin/coupons/add}" th:object="${newCoupon}" method="post">
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Code</label><input type="text" th:field="*{code}" class="form-control" required/></div>
                    <div class="mb-3"><label class="form-label">Loai giam</label><select th:field="*{discountType}" class="form-select"><option th:each="dt : ${discountTypes}" th:value="${dt}" th:text="${dt}"></option></select></div>
                    <div class="mb-3"><label class="form-label">Gia tri (% hoac d)</label><input type="number" th:field="*{discountValue}" class="form-control" required/></div>
                    <div class="mb-3"><label class="form-label">Don toi thieu (d)</label><input type="number" th:field="*{minOrderAmount}" class="form-control" value="0"/></div>
                    <div class="mb-3"><label class="form-label">So lan dung toi da</label><input type="number" th:field="*{maxUses}" class="form-control" value="100"/></div>
                    <div class="row g-2">
                        <div class="col"><label class="form-label">Tu ngay</label><input type="date" th:field="*{startDate}" class="form-control"/></div>
                        <div class="col"><label class="form-label">Den ngay</label><input type="date" th:field="*{endDate}" class="form-control"/></div>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">Them</button></div>
            </form>
        </div>
    </div>
</div>
<th:block th:replace="~{admin/layout/js :: js}"></th:block>
</body>
</html>
