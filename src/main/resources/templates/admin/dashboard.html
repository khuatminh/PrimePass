<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard — Admin PixelVault</title>
    <th:block th:replace="~{admin/layout/css :: css}" />
</head>
<body>
<div class="admin-shell">
    <th:block th:replace="~{admin/layout/sidebar :: sidebar(currentPage='dashboard')}" />
    <main class="admin-main">
        <div class="page-header">
            <h1>Dashboard</h1>
            <p>Tổng quan hoạt động cửa hàng</p>
        </div>

        <div class="kpi-grid">
            <div class="kpi">
                <div class="kpi-label">Tổng đơn hàng</div>
                <div class="kpi-value" th:text="${totalOrders}">0</div>
                <div class="kpi-sub">Tất cả trạng thái</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Doanh thu</div>
                <div class="kpi-value" th:text="'₫' + ${#numbers.formatDecimal(totalRevenue,0,'COMMA',0,'POINT')}">₫0</div>
                <div class="kpi-sub">Đơn hoàn thành</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Sản phẩm</div>
                <div class="kpi-value" th:text="${totalProducts}">0</div>
                <div class="kpi-sub">Đang hoạt động</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Người dùng</div>
                <div class="kpi-value" th:text="${totalUsers}">0</div>
                <div class="kpi-sub">Đã đăng ký</div>
            </div>
        </div>

        <div class="admin-section">
            <div class="admin-section-header">
                <div class="admin-section-title">Đơn hàng gần đây</div>
                <a th:href="@{/admin/orders}" class="btn btn-ghost" style="font-size:13px;">Xem tất cả</a>
            </div>
            <div class="table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Khách hàng</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Ngày đặt</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${recentOrders}">
                            <td class="font-mono text-muted-custom" th:text="'#' + ${order.id}"></td>
                            <td th:text="${order.user.username}"></td>
                            <td class="font-mono fw-semibold"
                                th:text="'₫' + ${#numbers.formatDecimal(order.finalAmount,0,'COMMA',0,'POINT')}">₫0</td>
                            <td>
                                <th:block th:switch="${order.status.name()}">
                                    <span th:case="'pending'" class="pill pill-warning" style="font-size:11px;">Chờ xử lý</span>
                                    <span th:case="'processing'" class="pill pill-accent" style="font-size:11px;">Đang xử lý</span>
                                    <span th:case="'completed'" class="pill pill-success" style="font-size:11px;">Hoàn thành</span>
                                    <span th:case="'cancelled'" class="pill pill-danger" style="font-size:11px;">Đã hủy</span>
                                    <span th:case="*" class="pill" style="font-size:11px;" th:text="${order.status}">-</span>
                                </th:block>
                            </td>
                            <td class="text-muted-custom" style="font-size:13px;"
                                th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-ghost px-2 py-1" style="font-size:12px;">Xem</a>
                            </td>
                        </tr>
                        <tr th:if="${recentOrders == null or recentOrders.empty}">
                            <td colspan="6" class="text-center text-muted-custom p-4">Chưa có đơn hàng nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{admin/layout/js :: js}" />
</body>
</html>
