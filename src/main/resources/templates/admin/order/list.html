<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><title>Don Hang | Admin</title><th:block th:replace="~{admin/layout/css :: css}"></th:block></head>
<body class="bg-dark text-white">
<div class="d-flex" style="min-height:100vh">
    <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>
    <div class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{admin/layout/header :: header('Quan Ly Don Hang')}"></div>
        <main class="p-4">
            <form th:action="@{/admin/orders}" method="get" class="d-flex gap-2 mb-3">
                <select name="status" class="form-select" style="max-width:200px">
                    <option value="">— Tat ca —</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s.name() == selectedStatus}"></option>
                </select>
                <button class="btn btn-outline-light">Loc</button>
            </form>
            <table class="table table-dark table-striped">
                <thead><tr><th>#</th><th>Khach</th><th>Tong tien</th><th>Trang thai</th><th>Ngay</th><th></th></tr></thead>
                <tbody>
                    <tr th:each="o : ${orders}">
                        <td th:text="${o.id}"></td>
                        <td th:text="${o.user.username}"></td>
                        <td th:text="${#numbers.formatDecimal(o.finalAmount,0,'COMMA',0,'POINT') + 'd'}"></td>
                        <td><span class="badge bg-primary" th:text="${o.status}"></span></td>
                        <td th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></td>
                        <td><a th:href="@{/admin/orders/{id}(id=${o.id})}" class="btn btn-sm btn-outline-light">Xem</a></td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>
</div>
<th:block th:replace="~{admin/layout/js :: js}"></th:block>
</body>
</html>
