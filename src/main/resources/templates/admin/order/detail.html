<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết đơn hàng — Admin PrimePass</title>
    <th:block th:replace="~{admin/layout/css :: css}" />
</head>
<body>
<div class="admin-shell">
    <th:block th:replace="~{admin/layout/sidebar :: sidebar(currentPage='orders')}" />
    <main class="admin-main">
        <div class="page-header">
            <div>
                <h1>Đơn hàng <span class="font-mono text-accent" th:text="'#' + ${order.id}"></span></h1>
                <p class="text-muted-custom mt-1" style="font-size:13px;"
                   th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></p>
            </div>
            <a th:href="@{/admin/orders}" class="btn btn-ghost" style="font-size:13px;">
                <i class="fa-solid fa-arrow-left"></i> Danh sách
            </a>
        </div>

        <div th:if="${successMessage}" class="mb-4" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--success);padding:12px 16px;border-radius:var(--r-sm);font-size:14px;">
            <i class="fa-solid fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>

        <div class="d-grid" style="grid-template-columns:1fr 300px;gap:24px;align-items:start;">

            <!-- Left: items + key delivery -->
            <div>
                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Variant</th>
                                <th>SL</th>
                                <th>Đơn giá</th>
                                <th>Key / Tài khoản</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${items}">
                                <td class="fw-semibold" th:text="${item.product.name}"></td>
                                <td class="text-muted-custom" style="font-size:13px;"
                                    th:text="${item.variant != null ? item.variant.variantLabel : '—'}"></td>
                                <td th:text="${item.quantity}"></td>
                                <td class="font-mono"
                                    th:text="'₫' + ${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT')}"></td>
                                <td>
                                    <span th:if="${item.productKey != null}">
                                        <span th:if="${item.productKey.keyType.name() == 'account'}"
                                              class="font-mono text-accent" style="font-size:12px;"
                                              th:text="${item.productKey.accountEmail + ' / ' + item.productKey.accountPassword}"></span>
                                        <span th:if="${item.productKey.keyType.name() == 'serial_key'}"
                                              class="font-mono text-accent" style="font-size:12px;"
                                              th:text="${item.productKey.serialKey}"></span>
                                    </span>
                                    <span th:if="${item.productKey == null}"
                                          class="text-muted-custom" style="font-size:12px;">Chưa giao</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right: meta + status update -->
            <div class="d-flex flex-column gap-3">
                <div class="form-card">
                    <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:16px;">Thông tin đơn hàng</h3>
                    <div class="d-flex flex-column gap-2" style="font-size:13.5px;">
                        <div class="d-flex justify-content-between">
                            <span class="text-muted-custom">Khách hàng</span>
                            <span class="fw-semibold" th:text="${order.user.username}"></span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted-custom">Thanh toán</span>
                            <span th:text="${order.paymentMethod}">—</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted-custom">VNPay Ref</span>
                            <span class="font-mono text-muted-custom" style="font-size:11px;"
                                  th:text="${order.vnpayTxnRef != null ? order.vnpayTxnRef : '—'}"></span>
                        </div>
                        <div style="height:1px;background:var(--line-subtle);"></div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted-custom">Tổng tiền</span>
                            <span class="font-mono"
                                  th:text="'₫' + ${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')}">₫0</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted-custom">Giảm giá</span>
                            <span class="font-mono text-success-custom"
                                  th:text="${order.discountAmount != null and order.discountAmount > 0} ? '−₫' + ${#numbers.formatDecimal(order.discountAmount,0,'COMMA',0,'POINT')} : '—'">—</span>
                        </div>
                        <div class="d-flex justify-content-between fw-bold" style="font-size:15px;">
                            <span>Thanh toán</span>
                            <span class="font-mono text-accent"
                                  th:text="'₫' + ${#numbers.formatDecimal(order.finalAmount,0,'COMMA',0,'POINT')}">₫0</span>
                        </div>
                    </div>
                </div>

                <div class="form-card">
                    <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:16px;">Cập nhật trạng thái</h3>
                    <div class="mb-3">
                        <th:block th:switch="${order.status.name()}">
                            <span th:case="'pending'" class="pill pill-warning">Chờ xử lý</span>
                            <span th:case="'processing'" class="pill pill-accent">Đang xử lý</span>
                            <span th:case="'completed'" class="pill pill-success">Hoàn thành</span>
                            <span th:case="'cancelled'" class="pill pill-danger">Đã hủy</span>
                            <span th:case="*" class="pill" th:text="${order.status}">-</span>
                        </th:block>
                    </div>
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="form-field mb-3">
                            <select name="status">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                        th:selected="${s == order.status}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 justify-content-center">
                            <i class="fa-solid fa-arrows-rotate"></i> Cập nhật
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{admin/layout/js :: js}" />
</body>
</html>
