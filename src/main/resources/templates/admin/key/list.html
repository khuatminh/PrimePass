<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Kho Key — Admin PrimePass</title>
    <th:block th:replace="~{admin/layout/css :: css}" />
</head>
<body>
<div class="admin-shell">
    <th:block th:replace="~{admin/layout/sidebar :: sidebar(currentPage='keys')}" />
    <main class="admin-main">
        <div class="page-header">
            <h1>Kho Key / Tài khoản</h1>
        </div>

        <div th:if="${successMessage}" class="mb-4" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--success);padding:12px 16px;border-radius:var(--r-sm);font-size:14px;">
            <i class="fa-solid fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>

        <div class="d-grid" style="grid-template-columns:1fr 380px;gap:24px;align-items:start;">
            <div>
                <div class="action-bar">
                    <form th:action="@{/admin/keys}" method="get" class="d-flex gap-2">
                        <select name="productId" style="background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-size:13.5px;outline:none;min-width:200px;">
                            <option value="">— Tất cả sản phẩm —</option>
                            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}" th:selected="${p.id == selectedProductId}"></option>
                        </select>
                        <button class="btn btn-ghost" type="submit">Lọc</button>
                    </form>
                </div>

                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Loại</th>
                                <th>Email / Key</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="k : ${keys}">
                                <td th:text="${k.product.name}"></td>
                                <td class="font-mono" style="font-size:12px;" th:text="${k.keyType}"></td>
                                <td class="font-mono text-muted-custom" style="font-size:12px;">
                                    <span th:if="${k.keyType.name() == 'account'}" th:text="${k.accountEmail}"></span>
                                    <span th:if="${k.keyType.name() == 'serial_key'}" th:text="${k.serialKey}"></span>
                                </td>
                                <td>
                                    <span th:if="${k.status.name() == 'available'}" class="pill pill-success" style="font-size:11px;">Có sẵn</span>
                                    <span th:unless="${k.status.name() == 'available'}" class="pill" style="font-size:11px;" th:text="${k.status}">-</span>
                                </td>
                            </tr>
                            <tr th:if="${keys == null or keys.empty}">
                                <td colspan="4" class="text-center text-muted-custom p-4">Không tìm thấy key nào.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Add key form -->
            <div class="form-card">
                <h3 style="font-family:var(--font-display);font-size:16px;margin-bottom:18px;">Nhập key / tài khoản</h3>
                <form th:action="@{/admin/keys/add}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-field">
                        <label>Sản phẩm *</label>
                        <select name="productId" required>
                            <option value="">-- Chọn sản phẩm --</option>
                            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}"></option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>Loại key</label>
                        <select name="keyType" id="keyTypeSelect" onchange="toggleKeyFields(this.value)">
                            <option value="account">Tài khoản (email + mật khẩu)</option>
                            <option value="serial_key">Serial Key</option>
                        </select>
                    </div>
                    <div id="accountFields">
                        <div class="form-field">
                            <label>Email</label>
                            <input type="text" name="accountEmail" placeholder="email@example.com" />
                        </div>
                        <div class="form-field">
                            <label>Mật khẩu</label>
                            <input type="text" name="accountPassword" placeholder="Mật khẩu tài khoản" />
                        </div>
                    </div>
                    <div id="serialFields" style="display:none;">
                        <div class="form-field">
                            <label>Serial Key</label>
                            <input type="text" name="serialKey" placeholder="XXXX-XXXX-XXXX-XXXX" />
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 justify-content-center">
                        <i class="fa-solid fa-plus"></i> Lưu key
                    </button>
                </form>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{admin/layout/js :: js}" />
<script>
function toggleKeyFields(type) {
  document.getElementById('accountFields').style.display = type === 'account' ? '' : 'none';
  document.getElementById('serialFields').style.display = type === 'serial_key' ? '' : 'none';
}
</script>
</body>
</html>
