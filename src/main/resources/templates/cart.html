<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ Hàng | Digital Marketplace</title>
    <th:block th:replace="~{layout/css :: css}"></th:block>
</head>
<body class="bg-dark text-light">
<div th:replace="~{layout/header :: header}"></div>
<div class="container py-5">
    <h2 class="fw-bold mb-4">Giỏ Hàng</h2>
    <div th:if="${cart.items.isEmpty()}">
        <p>Giỏ hàng trống. <a th:href="@{/marketplace}" class="text-primary">Tiếp tục mua sắm</a></p>
    </div>
    <div th:unless="${cart.items.isEmpty()}">
        <table class="table table-dark">
            <thead>
                <tr><th>Sản phẩm</th><th>Phân loại</th><th>Đơn giá</th><th>SL</th><th>Thành tiền</th><th></th></tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart.items}">
                    <td>
                        <img th:src="@{${item.imageUrl}}" width="40" class="me-2" />
                        <span th:text="${item.productName}"></span>
                    </td>
                    <td th:text="${item.variantLabel != null ? item.variantLabel : '-'}"></td>
                    <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" name="productId" th:value="${item.productId}" />
                            <input type="hidden" name="variantId" th:value="${item.variantId}" />
                            <button type="submit" class="btn btn-sm btn-outline-danger">Xóa</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="text-end mt-3">
            <h5>Tổng cộng: <strong th:text="${#numbers.formatDecimal(cart.totalPrice, 0, 'COMMA', 0, 'POINT') + 'đ'}"></strong></h5>
            <form th:action="@{/order/create}" method="post" class="mt-3">
                <div class="input-group mb-3" style="max-width: 300px; margin-left: auto;">
                    <input type="text" name="couponCode" class="form-control" placeholder="Mã giảm giá (nếu có)" />
                    <button type="submit" class="btn btn-primary">Đặt hàng & Thanh toán VNPay</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
<th:block th:replace="~{layout/js :: js}"></th:block>
</body>
</html>
