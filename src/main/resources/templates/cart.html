<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng — PrimePass</title>
    <th:block th:replace="~{layout/css :: css}" />
    <link rel="stylesheet" th:href="@{/css/cart.css}" />
</head>
<body>
<th:block th:replace="~{layout/header :: header}" />

<div class="cart-page">
  <div class="container">
    <h1>Giỏ hàng <span class="fw-normal text-muted-custom" style="font-size:16px;"
                      th:text="'(' + ${cart.totalQuantity} + ' sản phẩm)'"></span></h1>

    <!-- Empty cart -->
    <div class="empty-cart" th:if="${cart.items.isEmpty()}">
      <i class="fa-solid fa-bag-shopping"></i>
      <p class="mb-3" style="font-size:16px;">Giỏ hàng của bạn đang trống.</p>
      <a th:href="@{/marketplace}" class="btn btn-primary">Khám phá cửa hàng <i class="fa-solid fa-arrow-right"></i></a>
    </div>

    <div class="cart-layout" th:unless="${cart.items.isEmpty()}">
      <!-- Items list -->
      <div>
        <div class="cart-items-wrap">
          <div class="cart-header">
            <span></span>
            <span>Sản phẩm</span>
            <span class="text-end">Đơn giá</span>
            <span class="text-center">SL</span>
            <span class="text-end">Thành tiền</span>
          </div>
          <div th:each="item : ${cart.items}" class="cart-item">
            <div class="cart-item-thumb"
                 th:text="${#strings.toUpperCase(#strings.substring(item.productName, 0, T(java.lang.Math).min(2, item.productName.length())))}">PV</div>
            <div>
              <div class="cart-item-name" th:text="${item.productName}">Product</div>
              <div class="cart-item-variant" th:if="${item.variantLabel != null}" th:text="${item.variantLabel}">Variant</div>
            </div>
            <div class="cart-item-price" th:text="'₫' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}">₫0</div>
            <div class="cart-item-qty text-center" th:text="${item.quantity}">1</div>
            <div class="cart-item-total" th:text="'₫' + ${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')}">₫0</div>
            <div class="cart-item-remove">
              <form th:action="@{/cart/remove}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="productId" th:value="${item.productId}" />
                <input type="hidden" name="variantId" th:value="${item.variantId}" />
                <button type="submit" title="Xóa"><i class="fa-solid fa-xmark"></i></button>
              </form>
            </div>
          </div>
        </div>

        <div class="mt-3">
          <a th:href="@{/marketplace}" class="btn btn-ghost" style="font-size:13.5px;">
            <i class="fa-solid fa-arrow-left"></i> Tiếp tục mua sắm
          </a>
        </div>
      </div>

      <!-- Summary + Checkout -->
      <div class="cart-summary">
        <h3>Tổng đơn hàng</h3>

        <div th:each="item : ${cart.items}" class="summary-line">
          <span th:text="${item.productName + (item.variantLabel != null ? ' · ' + item.variantLabel : '')}">Item</span>
          <span th:text="'₫' + ${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')}">₫0</span>
        </div>

        <div class="summary-total">
          <span class="label">Tổng cộng</span>
          <span class="value" th:text="'₫' + ${#numbers.formatDecimal(cart.totalPrice, 0, 'COMMA', 0, 'POINT')}">₫0</span>
        </div>

        <form th:action="@{/order/create}" method="post" class="mt-3">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <div class="coupon-row">
            <input type="text" name="couponCode" placeholder="Mã giảm giá (nếu có)" />
            <button type="button" class="btn btn-ghost text-nowrap" style="font-size:13px;">Áp dụng</button>
          </div>

          <div class="payment-icons">
            <span>VNPAY</span>
            <span>MOMO</span>
            <span>ZALOPAY</span>
            <span>VISA</span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100 justify-content-center mt-2">
            <i class="fa-solid fa-lock"></i> Thanh toán VNPay
          </button>
          <p class="text-center text-dim mt-2" style="font-size:12px;">
            <i class="fa-solid fa-shield-halved"></i> Bảo mật SSL 256-bit · Giao hàng tự động sau thanh toán
          </p>
        </form>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{layout/footer :: footer}" />
<th:block th:replace="~{layout/js :: js}" />
</body>
</html>
