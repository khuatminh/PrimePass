<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Kết Quả Thanh Toán</title>
    <th:block th:replace="~{layout/css :: css}"></th:block>
</head>
<body class="bg-dark text-light">
<div th:replace="~{layout/header :: header}"></div>
<div class="container py-5 text-center">
    <div th:if="${success}">
        <div class="display-1 text-success mb-3">✓</div>
        <h2 class="text-success fw-bold">Thanh toán thành công!</h2>
        <p>Đơn hàng #<strong th:text="${order.id}"></strong> đã được xử lý.</p>
        <a th:href="@{/order/{id}(id=${order.id})}" class="btn btn-primary mt-3">Xem chi tiết & nhận key/tài khoản</a>
    </div>
    <div th:unless="${success}">
        <div class="display-1 text-danger mb-3">✗</div>
        <h2 class="text-danger fw-bold">Thanh toán thất bại</h2>
        <p th:text="${errorMessage}"></p>
        <a th:href="@{/cart}" class="btn btn-outline-primary mt-3">Quay lại giỏ hàng</a>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
<th:block th:replace="~{layout/js :: js}"></th:block>
</body>
</html>
